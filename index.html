<!DOCTYPE html>
<html>
<head>
    <title>Authix</title>
    <style>
        body {
            background-color: #36393f;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
        }
        .success { color: #57f287; }
        .failed { color: #ed4245; }
    </style>
</head>
<body>
    <div id="result">
        <h1>Authix</h1>
        <p>Processing...</p>
    </div>

    <script>
        // Get code from URL: ?code=xxxxx
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');
        const error = urlParams.get('error');
        
        if (error) {
            document.getElementById('result').innerHTML = `
                <h1 class="failed">❌ Failed!</h1>
                <p>Authorization was denied.</p>
            `;
        } else if (code) {
            // Success! Show success message
            document.getElementById('result').innerHTML = `
                <h1 class="success">✅ Success!</h1>
                <p>Your Discord account has been authorized.</p>
                <p>You can close this tab.</p>
            `;
            
            // OPTIONAL: Send code to your bot via webhook
            // This is how tokens get saved to auths.txt
            fetch('https://your-bot.onrihost.com/webhook/auth', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ code: code })
            }).catch(err => console.log('Webhook failed:', err));
        } else {
            document.getElementById('result').innerHTML = `
                <h1 class="failed">❌ Failed!</h1>
                <p>No authorization code received.</p>
            `;
        }
    </script>
</body>
</html>
