<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Memberz</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:      #0d0e11;
      --surface: #16181d;
      --border:  #2a2d35;
      --accent:  #7c6cff;
      --green:   #3dffa0;
      --red:     #ff4d6a;
      --text:    #e8eaf0;
      --muted:   #6b7280;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Mono', monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.35;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 60% 50% at 50% 50%,
        rgba(124,108,255,0.12) 0%, transparent 70%);
      z-index: 0;
      pointer-events: none;
    }

    .card {
      position: relative;
      z-index: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 52px;
      width: 100%;
      max-width: 460px;
      margin: 20px;
      text-align: center;
      box-shadow: 0 0 0 1px rgba(124,108,255,0.08), 0 32px 64px rgba(0,0,0,0.5);
      animation: slideUp 0.5s cubic-bezier(0.22,1,0.36,1) both;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 13px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .logo-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%,100% { opacity:1; transform: scale(1); }
      50%      { opacity:0.4; transform: scale(0.7); }
    }

    .icon {
      font-size: 56px;
      display: block;
      margin-bottom: 24px;
      animation: iconPop 0.6s 0.2s cubic-bezier(0.34,1.56,0.64,1) both;
    }

    @keyframes iconPop {
      from { opacity:0; transform: scale(0.4); }
      to   { opacity:1; transform: scale(1); }
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -0.02em;
      margin-bottom: 16px;
      animation: fadeIn 0.4s 0.3s both;
    }

    h1.success { color: var(--green); }
    h1.failed  { color: var(--red); }
    h1.loading { color: var(--text); }

    .subtitle {
      color: var(--muted);
      font-size: 13px;
      line-height: 2;
      animation: fadeIn 0.4s 0.4s both;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 28px 0;
      animation: fadeIn 0.4s 0.5s both;
    }

    .close-hint {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      animation: fadeIn 0.4s 0.6s both;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      border-radius: 99px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.05em;
      margin-top: 24px;
      animation: fadeIn 0.4s 0.5s both;
    }

    .badge.err { background: rgba(255,77,106,0.1); color: var(--red); border: 1px solid rgba(255,77,106,0.25); }

    .glow {
      position: absolute;
      inset: -1px;
      border-radius: 16px;
      pointer-events: none;
      border: 1px solid transparent;
      transition: border-color 1s, box-shadow 1s;
    }
    .glow.active {
      border-color: rgba(61,255,160,0.2);
      box-shadow: 0 0 60px rgba(61,255,160,0.07);
    }

    .spinner {
      width: 52px; height: 52px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 24px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .progress-bar-wrap {
      height: 2px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
      margin-top: 28px;
    }

    .progress-bar-fill {
      height: 100%;
      background: var(--accent);
      animation: fill 2s ease forwards;
    }

    @keyframes fill { from { width:0% } to { width:100% } }

    .error-detail {
      color: var(--red);
      font-size: 11px;
      margin-top: 10px;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <div class="card" id="card">
    <div class="glow" id="glow"></div>
    <div class="logo"><div class="logo-dot"></div>MEMBERZ</div>
    <div class="spinner"></div>
    <h1 class="loading">Verifying...</h1>
    <p class="subtitle">Checking your authorization code.</p>
    <div class="progress-bar-wrap"><div class="progress-bar-fill"></div></div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const code   = params.get('code');
    const error  = params.get('error');

    function renderSuccess(username) {
      document.getElementById('card').innerHTML = `
        <div class="glow active"></div>
        <div class="logo"><div class="logo-dot"></div>MEMBERZ</div>
        <span class="icon">✅</span>
        <h1 class="success">Success!</h1>
        <p class="subtitle">
          You have been linked up to the bot.<br>
          You may close this tab.
        </p>
        <div class="divider"></div>
        <p class="close-hint">linked as ${username}</p>
      `;
    }

    function renderError(msg) {
      document.getElementById('card').innerHTML = `
        <div class="glow"></div>
        <div class="logo"><div class="logo-dot"></div>MEMBERZ</div>
        <span class="icon">❌</span>
        <h1 class="failed">Auth Failed</h1>
        <p class="subtitle">Something went wrong while processing your code.</p>
        <p class="error-detail">${msg}</p>
        <span class="badge err">● Server error</span>
      `;
    }

    if (error) {
      document.getElementById('card').innerHTML = `
        <div class="glow"></div>
        <div class="logo"><div class="logo-dot"></div>MEMBERZ</div>
        <span class="icon">🚫</span>
        <h1 class="failed">Denied</h1>
        <p class="subtitle">You cancelled the authorization.<br>You can close this tab.</p>
        <span class="badge err">● Authorization denied</span>
      `;
    } else if (code) {
      fetch('/callback?code=' + encodeURIComponent(code))
        .then(async res => {
          const data = await res.json();
          if (res.ok && data.ok) {
            renderSuccess(data.username || 'unknown');
          } else {
            throw new Error(data.error || 'Server returned ' + res.status);
          }
        })
        .catch(err => renderError(err.message));
    } else {
      document.getElementById('card').innerHTML = `
        <div class="glow"></div>
        <div class="logo"><div class="logo-dot"></div>MEMBERZ</div>
        <span class="icon">⚠️</span>
        <h1 class="failed">No Code</h1>
        <p class="subtitle">No authorization code found.<br>Please use the link provided by the bot.</p>
        <span class="badge err">● Missing code</span>
      `;
    }
  </script>
</body>
</html>
